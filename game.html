<!doctype html>
<meta charset="utf-8" />
<title>Mini Platformer</title>
<style>
  html, body { margin: 0; height: 100%; display: grid; place-items: center; background: #0b1020; overflow: hidden; }
  #c { image-rendering: pixelated; image-rendering: crisp-edges; box-shadow: 0 10px 40px #0008; border: 2px solid #000; }
</style>
<canvas id="c"></canvas>

<script src="audio/sfx.js"></script>
<script src="audio/tracks.js"></script>
<script src="audio/audio-engine.js"></script>
<script>
  if (location.protocol === "file:") {
    const msg = document.createElement("div");
    msg.style.position = "fixed";
    msg.style.inset = "0";
    msg.style.display = "grid";
    msg.style.placeItems = "center";
    msg.style.padding = "16px";
    msg.style.color = "#ffffff";
    msg.style.fontFamily = "monospace";
    msg.style.textAlign = "center";
    msg.style.background = "#0b1020";
    msg.textContent = "This build uses ES modules and must be run over HTTP. Open http://localhost:8080/game.html";
    document.body.appendChild(msg);
  } else {
    const script = document.createElement("script");
    script.type = "module";
    script.src = "src/main.js?v=20260221c";
    document.body.appendChild(script);
  }
</script>
