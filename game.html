  // =========================
  // Audio (same synthesis as original)
  // =========================
  class AudioSynth {
    constructor() { this.ctx = null; this.muted = 0; }
    ensure() {
      if (this.ctx) return;
      this.ctx = new (AudioContext || webkitAudioContext)();
      this.ctx.resume && this.ctx.resume();
    }
    tone(freq, dur, at = 0, type = "square") {
      if (this.muted || !this.ctx) return;
      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      const start = this.ctx.currentTime + at;
      osc.type = type;
      osc.frequency.setValueAtTime(freq, start);
      gain.gain.setValueAtTime(0.06, start);
      osc.connect(gain);
      gain.connect(this.ctx.destination);
      osc.start(start);
      osc.stop(start + dur);
    }
    extraLifeJingle() { this.tone(880,0.06,0); this.tone(1175,0.06,0.07); this.tone(1760,0.08,0.14); }
    flagRaiseJingle() { this.tone(660,0.06,0.00); this.tone(990,0.08,0.08); }
    quack() { this.tone(560,0.05,0,"square"); this.tone(420,0.08,0.04,"square"); this.tone(240,0.08,0.08,"triangle"); }
  }

      this.cameraX = 0;

      this.winPending = 0;

      this.score = 0;
      this.lives = 3;
      this.nextExtraLifeScore = 100;
      this.helpTimer = 0;
      this.helpShownBlocks = new Set();

      this.bindInput();
      this.fitCanvas();
      addEventListener("resize", () => this.fitCanvas());

      this.loadLevel(0);
    }

    makeStars() {
      const stars = [];
      for (let i = 0; i < 90; i++) {
        this.starSeed = (this.starSeed * 1664525 + 1013904223) >>> 0;
        const x = this.starSeed % 2600;
        this.starSeed = (this.starSeed * 1664525 + 1013904223) >>> 0;
        const y = this.starSeed % 150;
        this.starSeed = (this.starSeed * 1664525 + 1013904223) >>> 0;
        const s = 1 + (this.starSeed % 2);
        stars.push([x, y, s]);
      }
      return stars;
    }

    rand01() {
      this.rngState ^= this.rngState << 13;
      this.rngState ^= this.rngState >>> 17;
      this.rngState ^= this.rngState << 5;
      return (this.rngState >>> 0) / 4294967296;
    }

    bindInput() {
      const preventKeys = new Set(["ArrowLeft","ArrowRight","ArrowUp","Space","KeyA","KeyD","KeyM","KeyZ","KeyR","KeyN"]);

      addEventListener("keydown", (e) => {
        if (preventKeys.has(e.code)) e.preventDefault();

        if (!this.keyDown[e.code]) {
          if (e.code === "Space" || e.code === "ArrowUp") this.jumpBuffer = JUMP_BUFFER_FRAMES;
          if (e.code === "KeyM") this.audio.muted ^= 1;
          if (e.code === "KeyZ") {
            const max = this.skeletonUnlocked ? CHARACTERS.length : CHARACTERS.length - 1;
            this.setCharacter((this.characterIndex + 1) % max);
            this.audio.tone(660, 0.04);
          }
          if (e.code === "KeyR") this.loadLevel(this.levelIndex);
          if (e.code === "KeyN") {
            if (this.levelIndex === LEVELS.length - 1) {
              this.skeletonUnlocked = 1;
              this.loadLevel(0);
            } else {
              this.loadLevel(this.levelIndex + 1);
            }
          }

          if (!this.audio.ctx) { this.audio.ensure(); }
        }

        this.keyDown[e.code] = 1;
      });

      addEventListener("keyup", (e) => {
        if (preventKeys.has(e.code)) e.preventDefault();
        this.keyDown[e.code] = 0;
      });
    }

      const s = Math.max(1, Math.floor(Math.min(innerWidth / CANVAS_W, innerHeight / CANVAS_H)));
      canvas.style.width = CANVAS_W * s + "px";
      canvas.style.height = CANVAS_H * s + "px";
    }

    setCharacter(index) {
      const oldW = this.player ? this.player.w : 10;
      const oldH = this.player ? this.player.h : 10;
      this.characterIndex = index;

      if (!this.player) return;

      const ch = CHARACTERS[this.characterIndex];
      const newW = ch.w, newH = ch.h;

      this.player.x += oldW * 0.5 - newW * 0.5;
      this.player.y += oldH - newH;

      this.player.w = newW;
      this.player.h = newH;

      this.player.quackFrame = 0;
      this.player.ninjaAirJumps = ch.doubleJumps;
      this.player.duckFuel = ch.duckFlight;
      this.player.duckFlying = 0;
    }

    loadLevel(index) {
      this.levelIndex = index;
      this.rngState = 1234567 + (this.levelIndex + 1) * 99991;

      this.tileGrid = LEVELS[this.levelIndex].map(r => r.split(""));
      this.tileRows = this.tileGrid.length;
      this.tileCols = this.tileGrid[0].length;

      this.enemies = [];
      this.coinDrops = [];
      this.blockDebris = [];

      this.winPending = 0;
      this.helpTimer = 0;
      this.helpShownBlocks.clear();

      let spawnX = 10, spawnY = 10;
      let goalMarker = null;

      const spawnFlyer = (type, tileX, tileY) => {
        const px = tileX * TILE_SIZE;
        const py = tileY * TILE_SIZE;
        this.enemies.push({
          type,
          x: px,
          y: py,
          baseX: px,
          baseY: py,
          vx: 0,
          vy: 0,
          w: 10,
          h: 10,
          dir: (tileX & 1) ? 1 : -1,
          onGround: 0,
          dead: 0,
          anim: 0,
          phase: ((tileX * 17 + tileY * 11) % 628) * 0.01
        });
      };

      for (let y = 0; y < this.tileRows; y++) {
        for (let x = 0; x < this.tileCols; x++) {
          const ch = this.tileGrid[y][x];
          if (ch === "S") {
            spawnX = x * TILE_SIZE;
            spawnY = y * TILE_SIZE;
            this.tileGrid[y][x] = ".";
          } else if (ch === "E") {
            this.enemies.push({ type: 0, x: x*TILE_SIZE, y: y*TILE_SIZE, vx: 0, vy: 0, w: 10, h: 10, dir: -1, onGround: 0, dead: 0, anim: 0 });
            this.tileGrid[y][x] = ".";
          } else if (ch === "V") {
            spawnFlyer(1, x, y);
            this.tileGrid[y][x] = ".";
          } else if (ch === "W") {
            spawnFlyer(2, x, y);
            this.tileGrid[y][x] = ".";
          } else if (ch === "Y") {
            spawnFlyer(3, x, y);
            this.tileGrid[y][x] = ".";
          } else if (ch === "F") {
            goalMarker = { x: x, y: y };
            this.tileGrid[y][x] = ".";
          }
        }
      }

      for (let y = 1; y < this.tileRows; y++) {
        for (let x = 0; x < this.tileCols; x++) {
          if (this.tileGrid[y][x] === "H" && this.tileGrid[y - 1][x] === ".") {
            this.tileGrid[y - 1][x] = "Q";
          }
        }
      }

      const extraFlyers = EXTRA_FLYERS_BY_LEVEL[this.levelIndex] || [];
      for (let i = 0; i < extraFlyers.length; i++) {
        const f = extraFlyers[i];
        spawnFlyer(f.type, f.x, f.y);
      }

      if (goalMarker) {
        const markerTx = goalMarker.x;
        const markerTy = goalMarker.y;
        let baseY = (this.tileRows - 1) * TILE_SIZE;
        for (let ty = markerTy + 1; ty < this.tileRows; ty++) {
          if (this.isSolid(this.tileIdAt(markerTx, ty))) { baseY = ty * TILE_SIZE; break; }
        }

        const poleHeightTiles = 9;
        const poleWidthPx = 10;
        let poleX = markerTx * TILE_SIZE;
        const leftSolid = this.isSolid(this.tileIdAt(markerTx - 1, markerTy));
        const rightSolid = this.isSolid(this.tileIdAt(markerTx + 1, markerTy));
        if (leftSolid && !rightSolid) poleX += 0.001;
        else if (rightSolid && !leftSolid) poleX -= 0.001;
        const poleTopY = baseY - poleHeightTiles * TILE_SIZE;
        const flagX = poleX + 6;
        const flagYStart = baseY - (poleHeightTiles - 6) * TILE_SIZE;
        const flagYEnd = baseY - (poleHeightTiles + 1) * TILE_SIZE;

        const poleHitbox = { x: poleX, y: poleTopY, w: poleWidthPx, h: poleHeightTiles * TILE_SIZE };
        const flagHitbox = { x: flagX, y: flagYStart, w: 10, h: 10 };

        this.goal = {
          x: poleX,
          markerY: markerTy * TILE_SIZE,
          baseY: baseY,
          poleHeightTiles: poleHeightTiles,
          poleWidthPx: poleWidthPx,
          hitboxPole: poleHitbox,
          hitboxFlag: flagHitbox,
          flagX: flagX,
          flagY: flagYStart,
          flagYStart: flagYStart,
          flagYEnd: flagYEnd,
          raising: 0,
          raiseFrame: 0,
          raiseFrames: 90
        };
      } else {
        this.goal = null;
      }

      this.player = {
        x: spawnX, y: spawnY, vx: 0, vy: 0, w: 10, h: 10,
        onGround: 0, coyote: 0, jumpBuf: 0, face: 1, anim: 0,
        wrapGrace: 0, quackFrame: 0, ninjaAirJumps: 0, duckFuel: 0, duckFlying: 0
      };

      this.setCharacter(this.characterIndex);

      this.cameraX = 0;
      this.cameraY = 0;
      this.levelNameBanner = 90;
    }

    tileIdAt(tx, ty) {
      if (tx < 0 || tx >= this.tileCols) return 1;
      if (ty < 0 || ty >= this.tileRows) return 0;
      const ch = this.tileGrid[ty][tx];
      return ch === "." ? 0 :
             ch === "#" ? 1 :
             ch === "B" ? 4 :
             ch === "o" ? 2 :
             ch === "O" ? 5 :
             ch === "U" ? 6 :
             ch === "H" ? 8 :
             ch === "h" ? 9 :
             ch === "Q" ? 10 :
             ch === "q" ? 11 :
             ch === "L" ? 7 : 0;
    }

    isSolid(tileId) { return tileId === 1 || tileId === 4 || tileId === 8 || tileId === 9 || tileId === 10 || tileId === 11; }

    triggerHelpBlock(tx, ty) {
      const key = this.levelIndex + ":" + tx + ":" + ty;
      if (this.helpShownBlocks.has(key)) return;
      this.helpShownBlocks.add(key);
      this.helpTimer = 420;
      this.setTile(tx, ty, "h");
      if (this.tileIdAt(tx, ty - 1) === 10) this.setTile(tx, ty - 1, "q");

      const cx = tx * TILE_SIZE + TILE_SIZE * 0.5;
      const cy = ty * TILE_SIZE + TILE_SIZE * 0.5;
      const n = 18;
      for (let i = 0; i < n; i++) {
        const a = this.rand01() * 6.283;
        const v = 0.8 + this.rand01() * 1.8;
        this.blockDebris.push({
          x: cx,
          y: cy,
          vx: Math.cos(a) * v,
          vy: -0.8 - this.rand01() * 2.1,
          t: 34 + ((this.rand01() * 14) | 0),
          s: 1 + (this.rand01() > 0.65 ? 1 : 0),
          col: this.rand01() > 0.35 ? "#f3d44a" : "#7dff3b"
        });
      }

      this.audio.tone(680, 0.04);
      this.audio.tone(920, 0.05, 0.05);
    }

    setTile(tx, ty, v) {
      if (tx >= 0 && tx < this.tileCols && ty >= 0 && ty < this.tileRows) this.tileGrid[ty][tx] = v;
    }

    collideX(e) {
      if (!e.vx) return;
      const dir = e.vx > 0 ? 1 : -1;
      const probeX = dir > 0 ? e.x + e.w : e.x;
      const tx = (probeX / TILE_SIZE) | 0;
      const y0 = (e.y / TILE_SIZE) | 0;
      const y1 = ((e.y + e.h - 1) / TILE_SIZE) | 0;

      for (let ty = y0; ty <= y1; ty++) {
        if (this.isSolid(this.tileIdAt(tx, ty))) {
          e.x = dir > 0 ? tx*TILE_SIZE - e.w - 0.001 : (tx + 1)*TILE_SIZE + 0.001;
          e.vx = 0;
          if (e.dir) e.dir *= -1;
          break;
        }
      }
    }

    collideY(e) {
      e.onGround = 0;
      if (!e.vy) return;

      const dir = e.vy > 0 ? 1 : -1;
      const probeY = dir > 0 ? e.y + e.h : e.y;
      const ty = (probeY / TILE_SIZE) | 0;
      const x0 = (e.x / TILE_SIZE) | 0;
      const x1 = ((e.x + e.w - 1) / TILE_SIZE) | 0;

      for (let tx = x0; tx <= x1; tx++) {
        const tileId = this.tileIdAt(tx, ty);
        if (this.isSolid(tileId)) {
          if (dir < 0 && tileId === 8) this.triggerHelpBlock(tx, ty);
          e.y = dir > 0 ? ty*TILE_SIZE - e.h - 0.001 : (ty + 1)*TILE_SIZE + 0.001;
          e.vy = 0;
          if (dir > 0) e.onGround = 1;
          break;
        }
      }
    }

    moveAndCollide(e) {
      e.x += e.vx;
      this.collideX(e);
      e.y += e.vy;
      this.collideY(e);
    }

    columnHasBottomGround(tx) { return this.isSolid(this.tileIdAt(tx, this.tileRows - 1)); }

    safeBottomGroundColumn() {
      const centerTx = ((this.player.x + this.player.w * 0.5) / TILE_SIZE) | 0;
      if (this.columnHasBottomGround(centerTx)) return centerTx;
      for (let d = 1; d < this.tileCols; d++) {
        const a = centerTx + d, b = centerTx - d;
        if (a < this.tileCols && this.columnHasBottomGround(a)) return a;
        if (b >= 0 && this.columnHasBottomGround(b)) return b;
      }
      return centerTx;
    }

    wrapToTop() {
      const tx = this.safeBottomGroundColumn();
      const p = this.player;

      p.x = clamp(tx*TILE_SIZE + TILE_SIZE*0.5 - p.w*0.5, 0, this.tileCols*TILE_SIZE - p.w - 0.001);
      p.y = -p.h - 12;
      p.vy = 0;
      p.coyote = 0;
      p.jumpBuf = 0;
      p.onGround = 0;
      p.duckFlying = 0;

      const ch = CHARACTERS[this.characterIndex];
      p.duckFuel = ch.duckFlight;
      p.ninjaAirJumps = ch.doubleJumps;

      p.vx *= 0.6;
      p.wrapGrace = 26;

      this.audio.tone(300, 0.04);
    }

    die(reset) {
      if (!reset) this.lives--;
      this.audio.tone(120, 0.10);

      if (this.lives < 0) {
        this.lives = 3;
        this.score = 0;
        this.nextExtraLifeScore = 100;
        this.skeletonUnlocked = 0;
        this.characterIndex = 0;
        this.loadLevel(0);
      } else {
        this.loadLevel(this.levelIndex);
      }
    }

    win() {
      this.audio.tone(980, 0.10);
      if (this.levelIndex === LEVELS.length - 1) {
        this.skeletonUnlocked = 1;
        this.loadLevel(0);
      } else {
        this.loadLevel(this.levelIndex + 1);
      }
    }

    addScore(v) {
      this.score += v;
      while (this.score >= this.nextExtraLifeScore) {
        this.lives++;
        this.nextExtraLifeScore += 100;
        this.audio.extraLifeJingle();
      }
    }

    spawnCoinDrops(x, y) {
      const n = 10 + ((this.rand01() * 9) | 0);
      for (let i = 0; i < n; i++) {
        const a = this.rand01() * 6.283;
        const v = (this.rand01() * 1.4 + 0.8);
        const ox = (this.rand01() - 0.5) * 10;
        const oy = this.rand01() * 4;
        this.coinDrops.push({ x: x + ox, y: y - 12 - oy, vx: Math.cos(a) * v, vy: -2.8 - this.rand01() * 1.3, w: 10, h: 10, onGround: 0, t: 260, collectDelay: 10 });
      }
    }

    collectTiles() {
      const p = this.player;
      const x0 = (p.x / TILE_SIZE) | 0;
      const x1 = ((p.x + p.w - 1) / TILE_SIZE) | 0;
      const y0 = (p.y / TILE_SIZE) | 0;
      const y1 = ((p.y + p.h - 1) / TILE_SIZE) | 0;

      for (let y = y0; y <= y1; y++) {
        for (let x = x0; x <= x1; x++) {
          const id = this.tileIdAt(x, y);
          if (id === 7) return this.die(0);
          if (id === 2) { this.setTile(x,y,"."); this.addScore(1); this.audio.tone(740,0.03); }
          else if (id === 5) { this.setTile(x,y,"."); this.addScore(10); this.audio.tone(1040,0.05); }
          else if (id === 6) { this.setTile(x,y,"."); this.lives++; this.audio.extraLifeJingle(); }
        }
      }
    }

    collectibleSprite(tileId) {
      const theme = getThemeForLevel(this.levelIndex);
      if (theme === "CASTLE") return tileId === 2 ? SPRITES.ccoin : SPRITES.bccoin;
      if (tileId === 2) return theme === "JUNGLE" ? SPRITES.fruit : theme === "FACTORY" ? SPRITES.gear : (theme === "ICE" || theme === "SPACE") ? SPRITES.gem : SPRITES.coin;
      return theme === "JUNGLE" ? SPRITES.bfruit : theme === "FACTORY" ? SPRITES.bgear : (theme === "ICE" || theme === "SPACE") ? SPRITES.bgem : SPRITES.bcoin;
    }

    tileSprite(tileId) {
      const theme = getThemeForLevel(this.levelIndex);
      if (tileId === 1) {
        return theme === "JUNGLE" ? SPRITES.jt1 :
               theme === "FACTORY" ? SPRITES.ft1 :
               theme === "CASTLE" ? SPRITES.ct1 :
               theme === "ICE" ? SPRITES.it1 :
               theme === "VOLCANO" ? SPRITES.vt1 :
               theme === "SPACE" ? SPRITES.spt1 :
               theme === "NITE" ? SPRITES.nt1 : SPRITES.t1;
      }
      if (tileId === 4) {
        return theme === "JUNGLE" ? SPRITES.jt4 :
               theme === "FACTORY" ? SPRITES.ft4 :
               theme === "CASTLE" ? SPRITES.ct4 :
               theme === "ICE" ? SPRITES.it4 :
               theme === "VOLCANO" ? SPRITES.vt4 :
               theme === "SPACE" ? SPRITES.spt4 :
               theme === "NITE" ? SPRITES.nt4 : SPRITES.t4;
      }
      return null;
    }

    step() {
      if (this.levelNameBanner) this.levelNameBanner--;
      if (this.helpTimer > 0) this.helpTimer--;

      const p = this.player;
      p.anim++;

      const L = this.keyDown.ArrowLeft || this.keyDown.KeyA;
      const R = this.keyDown.ArrowRight || this.keyDown.KeyD;
      const JH = this.keyDown.Space || this.keyDown.ArrowUp;

      const physics = PHYSICS_BY_THEME[getThemeForLevel(this.levelIndex)] || PHYSICS_BY_THEME[DEFAULT_THEME];
      const gr = physics.gravity;
      const fr = physics.groundFriction;
      const af = physics.airFriction;

      const character = CHARACTERS[this.characterIndex];
      const name = character.name;

      // Horizontal
      const dir = (R ? 1 : 0) - (L ? 1 : 0);
      if (dir) {
        p.vx += dir * PLAYER_AX;
        p.face = dir;
        p.vx = clamp(p.vx, -PLAYER_MAX_VX, PLAYER_MAX_VX);
      } else {
        p.vx *= p.onGround ? fr : af;
      }

      // Jump buffer transfer
      if (this.jumpBuffer) { p.jumpBuf = this.jumpBuffer; this.jumpBuffer = 0; }
      else p.jumpBuf = Math.max(0, p.jumpBuf - 1);

      // Ground resets
      if (p.onGround) {
        p.coyote = COYOTE_FRAMES;
        p.ninjaAirJumps = character.doubleJumps;
        p.duckFuel = character.duckFlight;
        p.duckFlying = 0;
      } else {
        p.coyote = Math.max(0, p.coyote - 1);
      }

      // Duck sustained flight
      if (p.duckFlying) {
        if (name !== "DUCK") p.duckFlying = 0;
        else if (JH && p.duckFuel > 0) {
          p.duckFuel--;
          p.vy -= 0.16;
          if (p.vy < -2.4) p.vy = -2.4;
        } else {
          p.duckFlying = 0;
        }
      }

      // Jump consume (same logic, clearer names)
      if (p.jumpBuf) {
        const isDuck = (name === "DUCK");
        const isNinja = (name === "NINJA");

        const canCoyoteJump = (p.coyote > 0);
        const canNinjaAirJump = isNinja && (p.ninjaAirJumps > 0);
        const canStartDuckFlight = isDuck && (p.duckFuel > 0);

        if (canCoyoteJump) {
          p.vy = JUMP_VY * character.jumpMul;
          p.jumpBuf = 0;
          p.coyote = 0;
          p.onGround = 0;
          if (isDuck) { p.quackFrame = 10; this.audio.quack(); }
          else this.audio.tone(420, 0.05);
        } else if (canNinjaAirJump) {
          p.ninjaAirJumps--;
          p.vy = JUMP_VY * character.jumpMul;
          p.jumpBuf = 0;
          this.audio.tone(520, 0.05);
        } else if (canStartDuckFlight) {
          p.duckFlying = 1;
          p.duckFuel = Math.max(0, p.duckFuel - 6);
          p.vy = Math.min(p.vy, -2.2);
          p.jumpBuf = 0;
          p.quackFrame = 10;
          this.audio.quack();
        }
      }

      // Gravity + jump cut
      p.vy += gr * (p.duckFlying ? 0.25 : 1);
      if (p.vy > 8.5) p.vy = 8.5;
      if (!JH && p.vy < 0) p.vy *= 0.55;

      this.moveAndCollide(p);

      if (p.duckFlying && p.vy === 0 && !p.onGround) p.duckFlying = 0;

      this.collectTiles();
      if (this.goal) {
        if (!this.winPending && rectsOverlap(p, this.goal.hitboxFlag)) {
          this.winPending = 1;
          this.goal.raising = 1;
          this.goal.raiseFrame = 0;
          this.audio.flagRaiseJingle();
        }

        if (this.goal.raising) {
          this.goal.raiseFrame = Math.min(this.goal.raiseFrames, this.goal.raiseFrame + 1);
          const t = this.goal.raiseFrame / this.goal.raiseFrames;
          this.goal.flagY = this.goal.flagYStart + (this.goal.flagYEnd - this.goal.flagYStart) * t;
          this.goal.hitboxFlag.y = this.goal.flagY;
          if (this.goal.raiseFrame >= this.goal.raiseFrames) {
            this.goal.raising = 0;
            if (this.winPending) this.win();
          }
        }
      }
      if (p.quackFrame) p.quackFrame--;

      // Coin drops
      for (let i = 0; i < this.coinDrops.length; i++) {
        const d = this.coinDrops[i];
        if (d.t-- <= 0) { d.dead = 1; continue; }
        if (d.collectDelay > 0) d.collectDelay--;
        d.vy += gr;
        d.vx *= 0.985;
        this.moveAndCollide(d);
        if (d.collectDelay <= 0 && rectsOverlap(p, d)) { d.dead = 1; this.addScore(1); this.audio.tone(740, 0.03); }
      }
      this.coinDrops = this.coinDrops.filter(d => !d.dead);

      // Help block debris
      for (let i = 0; i < this.blockDebris.length; i++) {
        const d = this.blockDebris[i];
        if (d.t-- <= 0) { d.dead = 1; continue; }
        d.vy += gr * 0.6;
        d.vx *= 0.98;
        d.x += d.vx;
        d.y += d.vy;
      }
      this.blockDebris = this.blockDebris.filter(d => !d.dead);

      // Enemies
      const levelTheme = getThemeForLevel(this.levelIndex);
      const spaceMode = levelTheme === "SPACE";
      for (let i = 0; i < this.enemies.length; i++) {
        const e = this.enemies[i];
        if (e.dead) continue;
        e.anim++;

        if (e.type) {
          if (spaceMode) {
            if (e.type === 1) {
              e.vx = e.dir * 1.35;
              e.x += e.vx;
              this.collideX(e);
              e.y = e.baseY + Math.sin(e.anim * 0.22 + e.phase) * 5;
            } else if (e.type === 2) {
              const lane = Math.sin(e.phase * 1.9) > 0 ? 14 : -14;
              const targetX = p.x + lane + Math.sin(e.anim * 0.05 + e.phase) * 12;
              const desired = targetX >= e.x ? 1.0 : -1.0;
              e.vx += (desired - e.vx) * 0.07;
              e.x += e.vx;
              this.collideX(e);
              const swoop = Math.max(0, Math.sin(e.anim * 0.11 + e.phase)) * 8;
              e.y = e.baseY + Math.sin(e.anim * 0.08 + e.phase) * 2 + swoop;
            } else {
              const loopT = e.anim * 0.12 + e.phase;
              const drift = Math.sin(e.anim * 0.03 + e.phase) * 10;
              e.x = e.baseX + drift + Math.cos(loopT) * 14;
              e.y = e.baseY + Math.sin(loopT * 2.3) * 6;
            }
          } else if (e.type === 1) {
            e.vx = e.dir * 1.25;
            e.x += e.vx;
            this.collideX(e);
            e.y = e.baseY + Math.sin(e.anim * 0.15 + e.phase) * 6;
          } else if (e.type === 2) {
            e.vx = e.dir * 0.95;
            e.x += e.vx;
            this.collideX(e);
            const bob = Math.sin(e.anim * 0.10 + e.phase) * 3;
            const dip = Math.max(0, Math.sin(e.anim * 0.05 + e.phase)) * 7;
            e.y = e.baseY + bob + dip;
          } else {
            const loopT = e.anim * 0.09 + e.phase;
            e.x = e.baseX + Math.cos(loopT) * 12;
            e.y = e.baseY + Math.sin(loopT * 2) * 5;
          }
        } else {
          e.vx = e.dir * ENEMY_SPEED;
          e.vy += gr;
          if (e.vy > 8.5) e.vy = 8.5;
          this.moveAndCollide(e);

          if (e.onGround) {
            const ax = e.x + (e.dir > 0 ? e.w + 1 : -1);
            const tx = (ax / TILE_SIZE) | 0;
            const ty = ((e.y + e.h + 1) / TILE_SIZE) | 0;
            if (!this.isSolid(this.tileIdAt(tx, ty))) e.dir *= -1;
          }
        }

        if (rectsOverlap(p, e)) {
          if (e.type && name === "SKELETON") {
            e.dead = 1;
            this.spawnCoinDrops(e.x + 2, e.y + 2);
            this.audio.tone(180, 0.08);
          } else if (p.vy > 0 && p.y + p.h - 2 < e.y + e.h * 0.55) {
            e.dead = 1;
            p.vy = JUMP_VY * 0.6;
            this.spawnCoinDrops(e.x + 2, e.y + 2);
            this.audio.tone(e.type ? 260 : 220, 0.08);
          } else {
            this.die(0);
          }
        }

        if (e.y > this.tileRows * TILE_SIZE + 90) e.dead = 1;
      }

      if (spaceMode) {
        for (let i = 0; i < this.enemies.length; i++) {
          const a = this.enemies[i];
          if (a.dead || !a.type) continue;
          for (let j = i + 1; j < this.enemies.length; j++) {
            const b = this.enemies[j];
            if (b.dead || !b.type) continue;
            const dx = a.x - b.x;
            const dy = a.y - b.y;
            if (Math.abs(dx) < 14 && Math.abs(dy) < 9) {
              const push = dx >= 0 ? 0.4 : -0.4;
              a.x += push;
              b.x -= push;
            }
          }
        }
      }

      // Wrap / fall
      if (p.wrapGrace) p.wrapGrace--;
      else if (p.y > this.tileRows * TILE_SIZE + 40) this.wrapToTop();

      // Camera
      const tx = p.x + p.w * 0.5 - CANVAS_W * 0.5;
      const ty = p.y + p.h * 0.5 - CANVAS_H * 0.55;
      this.cameraX += (clamp(tx, 0, this.tileCols*TILE_SIZE - CANVAS_W) - this.cameraX) * 0.12;
      this.cameraY += (clamp(ty, 0, this.tileRows*TILE_SIZE - CANVAS_H) - this.cameraY) * 0.10;
    }

    drawSprite(sprite, x, y, scale) {
      const px = x | 0, py = y | 0;
      let current = "";
      for (let r = 0; r < sprite.length; r++) {
        const row = sprite[r];
        for (let i = 0; i < row.length; i++) {
          const ch = row[i];
          if (ch === ".") continue;
          const col = PALETTE[ch];
          if (col !== current) { current = col; gfx.fillStyle = current; }
          gfx.fillRect(px + i*scale, py + r*scale, scale, scale);
        }
      }
    }

    drawSpaceThruster(enemy) {
      const px = ((enemy.x - this.cameraX) | 0);
      const py = ((enemy.y - this.cameraY) | 0);
      const flicker = ((enemy.anim + ((enemy.phase * 100) | 0)) & 3);
      const flameH = 2 + (flicker >> 1);

      if (enemy.type === 2) {
        gfx.fillStyle = PALETTE.M;
        gfx.fillRect(px + 2, py + 10, 2, flameH + 1);
        gfx.fillRect(px + 6, py + 10, 2, flameH + 1);
        gfx.fillStyle = PALETTE.H;
        gfx.fillRect(px + 2, py + 10, 1, flameH);
        gfx.fillRect(px + 7, py + 10, 1, flameH);
      } else {
        gfx.fillStyle = PALETTE.M;
        gfx.fillRect(px + 4, py + 10, 2, flameH + 1);
        gfx.fillStyle = PALETTE.H;
        gfx.fillRect(px + 4, py + 10, 1, flameH);
      }

      gfx.fillStyle = flicker < 2 ? PALETTE.F : PALETTE.K;
      gfx.fillRect(px + 4, py + 9, 2, 1);
    }

    drawBackground() {
      const camx = this.cameraX;
      const theme = getThemeForLevel(this.levelIndex);
      if (theme === "DAY") {
        gfx.fillStyle = "#6bb7ff"; gfx.fillRect(0,0,CANVAS_W,CANVAS_H);
        const bx = ((camx * 0.3) | 0) % CANVAS_W;
        gfx.fillStyle = "#bfe6ff";
        for (let i = -1; i < 3; i++) {
          const x = i*CANVAS_W - bx;
          gfx.fillRect(x+40,20,50,12); gfx.fillRect(x+65,14,30,10);
          gfx.fillRect(x+170,36,70,14); gfx.fillRect(x+200,30,40,10);
        }
      } else if (theme === "JUNGLE") {
        gfx.fillStyle = "#2f8f74"; gfx.fillRect(0,0,CANVAS_W,CANVAS_H);
        const p1 = ((camx*0.18)|0) % CANVAS_W, p2 = ((camx*0.35)|0) % CANVAS_W;
        gfx.fillStyle = "#1f6f45";
        for (let i=-1;i<3;i++){const x=i*CANVAS_W-p1; gfx.fillRect(x,104,210,90); gfx.fillRect(x+90,92,230,100); gfx.fillRect(x+170,98,160,96);}
        gfx.fillStyle = "#12472a";
        for (let i=-1;i<3;i++){const x=i*CANVAS_W-p2; gfx.fillRect(x,120,240,70); gfx.fillRect(x+70,108,260,82); gfx.fillRect(x+170,114,200,76);}
        gfx.fillStyle = "#081f12";
        for (let i=0;i<22;i++){let x=((i*17-(camx*0.6))|0)%CANVAS_W; x=(x+CANVAS_W)%CANVAS_W; gfx.fillRect(x,0,6,42);}
      } else if (theme === "FACTORY") {
        gfx.fillStyle = "#ffb36b"; gfx.fillRect(0,0,CANVAS_W,CANVAS_H);
        const p1=((camx*0.2)|0)%CANVAS_W, p2=((camx*0.45)|0)%CANVAS_W;
        gfx.fillStyle="#3a2a2a";
        for (let i=-1;i<3;i++){const x=i*CANVAS_W-p1; gfx.fillRect(x,112,260,70); gfx.fillRect(x+60,96,280,86); gfx.fillRect(x+180,86,170,96);}
        gfx.fillStyle="#1b1414";
        for (let i=-1;i<3;i++){const x=i*CANVAS_W-p2; gfx.fillRect(x,128,290,62); gfx.fillRect(x+80,110,300,80);}
        gfx.fillStyle="#ffffff10";
        for (let i=0;i<26;i++){let x=((i*19-(camx*0.75))|0)%CANVAS_W; x=(x+CANVAS_W)%CANVAS_W; gfx.fillRect(x,0,6,28);}
        gfx.fillStyle="#00000010";
        for (let i=0;i<14;i++){let x=((i*37-(camx*0.25))|0)%CANVAS_W; x=(x+CANVAS_W)%CANVAS_W; gfx.fillRect(x,64,12,120);}
      } else if (theme === "CASTLE") {
        gfx.fillStyle="#7fa0be"; gfx.fillRect(0,0,CANVAS_W,CANVAS_H);
        const p1=((camx*0.16)|0)%CANVAS_W, p2=((camx*0.30)|0)%CANVAS_W;
        gfx.fillStyle="#3b4f66";
        for (let i=-1;i<3;i++){const x=i*CANVAS_W-p1; gfx.fillRect(x,112,230,80); gfx.fillRect(x+70,98,260,94);}
        gfx.fillStyle="#223448";
        for (let i=-1;i<3;i++){const x=i*CANVAS_W-p2; gfx.fillRect(x,126,280,64); gfx.fillRect(x+65,112,290,78);}
        gfx.fillStyle="#b9d0e5";
        for (let i=0;i<16;i++){let x=((i*41-(camx*0.5))|0)%CANVAS_W; x=(x+CANVAS_W)%CANVAS_W; gfx.fillRect(x,94,8,30); gfx.fillRect(x+2,90,4,6);}
      } else if (theme === "ICE") {
        gfx.fillStyle="#87c9ff"; gfx.fillRect(0,0,CANVAS_W,CANVAS_H);
        const p1=((camx*0.18)|0)%CANVAS_W, p2=((camx*0.33)|0)%CANVAS_W;
        gfx.fillStyle="#2a5a88";
        for (let i=-1;i<3;i++){const x=i*CANVAS_W-p1; gfx.fillRect(x,112,220,80); gfx.fillRect(x+80,96,260,96);}
        gfx.fillStyle="#163a66";
        for (let i=-1;i<3;i++){const x=i*CANVAS_W-p2; gfx.fillRect(x,128,260,62); gfx.fillRect(x+60,110,280,80);}
        gfx.fillStyle="#bfe9ff";
        for (let i=0;i<18;i++){let x=((i*33-(camx*0.55))|0)%CANVAS_W; x=(x+CANVAS_W)%CANVAS_W; gfx.fillRect(x,92,6,36); gfx.fillRect(x+3,104,10,6);}
      } else if (theme === "VOLCANO") {
        gfx.fillStyle="#260013"; gfx.fillRect(0,0,CANVAS_W,CANVAS_H);
        const p1=((camx*0.2)|0)%CANVAS_W, p2=((camx*0.45)|0)%CANVAS_W;
        gfx.fillStyle="#3b001c";
        for (let i=-1;i<3;i++){const x=i*CANVAS_W-p1; gfx.fillRect(x,120,280,70); gfx.fillRect(x+70,105,260,85); gfx.fillRect(x+190,92,170,98);}
        gfx.fillStyle="#12000a";
        for (let i=-1;i<3;i++){const x=i*CANVAS_W-p2; gfx.fillRect(x,132,320,58); gfx.fillRect(x+80,114,300,76);}
        gfx.fillStyle="#ff5a0030";
        for (let i=0;i<18;i++){let x=((i*37-(camx*0.6))|0)%CANVAS_W; x=(x+CANVAS_W)%CANVAS_W; gfx.fillRect(x,92,10,98);}
        gfx.fillStyle="#ff6a0020";
        for (let i=0;i<28;i++){let x=((i*19-(camx*0.9))|0)%CANVAS_W; x=(x+CANVAS_W)%CANVAS_W; gfx.fillRect(x,0,4,28);}
      } else if (theme === "NITE") {
        gfx.fillStyle="#0b0f2a"; gfx.fillRect(0,0,CANVAS_W,CANVAS_H);
        gfx.fillStyle="#a8c7ff";
        for (let i=0;i<this.starField.length;i++){
          const s=this.starField[i];
          let x=((s[0]-camx*0.10)|0)%2600, y=s[1];
          x=((x%CANVAS_W)+CANVAS_W)%CANVAS_W;
          gfx.fillRect(x,y,s[2],s[2]);
        }
        gfx.fillStyle="#d9e6ff"; gfx.beginPath(); gfx.arc(CANVAS_W-52,36,20,0,6.283); gfx.fill();
        gfx.fillStyle="#0b0f2a"; gfx.beginPath(); gfx.arc(CANVAS_W-44,30,18,0,6.283); gfx.fill();

        const sx=((camx*0.12)|0)%CANVAS_W;
        gfx.fillStyle="#050711";
        for (let i=-1;i<3;i++){const x=i*CANVAS_W-sx; gfx.fillRect(x,110,160,70); gfx.fillRect(x+40,96,110,84); gfx.fillRect(x+90,86,80,94);}
        gfx.fillStyle="#ffffff10";
        for (let i=-1;i<3;i++){const x=i*CANVAS_W-(((camx*0.5)|0)%CANVAS_W); gfx.fillRect(x,122,220,6); gfx.fillRect(x+60,134,240,7);}
      } else if (theme === "SPACE") {
        gfx.fillStyle="#060815"; gfx.fillRect(0,0,CANVAS_W,CANVAS_H);
        gfx.fillStyle="#95b5ff";
        for (let i=0;i<this.starField.length;i++){
          const s=this.starField[i];
          let x=((s[0]-camx*0.14)|0)%2600, y=(s[1]*0.9)|0;
          x=((x%CANVAS_W)+CANVAS_W)%CANVAS_W;
          gfx.fillRect(x,y,s[2],s[2]);
        }
        gfx.fillStyle="#4f6be0";
        gfx.beginPath(); gfx.arc(CANVAS_W-54,32,16,0,6.283); gfx.fill();
        gfx.fillStyle="#89a2ff";
        gfx.beginPath(); gfx.arc(CANVAS_W-48,28,6,0,6.283); gfx.fill();
        const p1=((camx*0.18)|0)%CANVAS_W, p2=((camx*0.34)|0)%CANVAS_W;
        gfx.fillStyle="#1a2247";
        for (let i=-1;i<3;i++){const x=i*CANVAS_W-p1; gfx.fillRect(x,124,250,66); gfx.fillRect(x+80,112,260,78);}
        gfx.fillStyle="#0c122f";
        for (let i=-1;i<3;i++){const x=i*CANVAS_W-p2; gfx.fillRect(x,136,300,54); gfx.fillRect(x+70,118,290,72);}
      } else {
        gfx.fillStyle = "#6bb7ff";
        gfx.fillRect(0, 0, CANVAS_W, CANVAS_H);
      }
    }

    drawPlayer(px, py) {
      const p = this.player;
      const name = CHARACTERS[this.characterIndex].name;
      const running = Math.abs(p.vx) > 0.2 && p.onGround;
      const alt = ((p.anim >> 4) & 1);

      if (name === "SKELETON") {
        const top = running ? (alt ? SPRITES.st1 : SPRITES.st0) : SPRITES.st0;
        const bot = running ? (alt ? SPRITES.sb1 : SPRITES.sb0) : SPRITES.sb0;
        this.drawSprite(top, px, py, 1);
        this.drawSprite(bot, px, py + 10, 1);
        return;
      }

      if (name === "DUCK") {
        const spr = p.quackFrame ? SPRITES.duq : (running ? (alt ? SPRITES.du1 : SPRITES.du0) : SPRITES.du0);
        this.drawSprite(spr, px, py, 1);
        return;
      }

      const anim = CHARACTERS[this.characterIndex].anim;
      const spr = running ? (alt ? SPRITES[anim[1]] : SPRITES[anim[0]]) : SPRITES[anim[0]];
      this.drawSprite(spr, px, py, 1);
    }

    render() {
      gfx.setTransform(1,0,0,1,0,0);
      this.drawBackground();

      const sx = (this.cameraX / TILE_SIZE) | 0;
      const sy = (this.cameraY / TILE_SIZE) | 0;
      const ex = sx + ((CANVAS_W / TILE_SIZE) | 0) + 3;
      const ey = sy + ((CANVAS_H / TILE_SIZE) | 0) + 3;

      const t = ((this.player.anim >> 3) % 3);
      const theme = getThemeForLevel(this.levelIndex);
      for (let y = sy; y < ey; y++) for (let x = sx; x < ex; x++) {
        const id = this.tileIdAt(x, y);
        const px = x*TILE_SIZE - this.cameraX;
        const py = y*TILE_SIZE - this.cameraY;

        if (id === 1 || id === 4) {
          this.drawSprite(this.tileSprite(id), px, py, 1);
          if (theme === "SPACE" && (((x * 5 + y * 3 + t) & 7) === 0)) {
            gfx.fillStyle = PALETTE.H;
            gfx.fillRect(px + 1, py + 1, 1, 1);
          }
        }
        else if (id === 2 || id === 5) this.drawSprite(this.collectibleSprite(id), px, py, 1);
        else if (id === 6) this.drawSprite(theme === "CASTLE" ? SPRITES.coneup : SPRITES.oneup, px, py, 1);
        else if (id === 7) this.drawSprite((t & 1) ? SPRITES.lav0 : SPRITES.lav1, px, py, 1);
        else if (id === 10) this.drawSprite(((this.player.anim >> 3) & 1) ? SPRITES.hbt1 : SPRITES.hbt0, px, py, 1);
        else if (id === 8) this.drawSprite(((this.player.anim >> 3) & 1) ? SPRITES.hbb1 : SPRITES.hbb0, px, py, 1);
        else if (id === 11) this.drawSprite(SPRITES.hut, px, py, 1);
        else if (id === 9) this.drawSprite(SPRITES.hub, px, py, 1);
      }

      if (this.goal) {
        const baseX = (this.goal.x - this.cameraX) | 0;
        const baseY = (this.goal.baseY - this.cameraY) | 0;
        for (let j = 1; j <= this.goal.poleHeightTiles; j++) {
          this.drawSprite(((j ^ t) & 1) ? SPRITES.pole0 : SPRITES.pole1, baseX, baseY - j*TILE_SIZE, 1);
        }
        this.drawSprite(SPRITES.polet, baseX, baseY - (this.goal.poleHeightTiles + 1) * TILE_SIZE, 1);
        this.drawSprite(t === 0 ? SPRITES.flag0 : t === 1 ? SPRITES.flag1 : SPRITES.flag2, (this.goal.flagX - this.cameraX) | 0, (this.goal.flagY - this.cameraY) | 0, 1);
      }

      for (let i = 0; i < this.coinDrops.length; i++) this.drawSprite(this.collectibleSprite(2), this.coinDrops[i].x - this.cameraX, this.coinDrops[i].y - this.cameraY, 1);

      for (let i = 0; i < this.blockDebris.length; i++) {
        const d = this.blockDebris[i];
        gfx.fillStyle = d.col;
        gfx.fillRect((d.x - this.cameraX) | 0, (d.y - this.cameraY) | 0, d.s, d.s);
      }

      for (let i = 0; i < this.enemies.length; i++) {
        const e = this.enemies[i];
        if (e.dead) continue;
        const f = ((e.anim >> 3) & 1);
        let spr;
        if (e.type === 0) {
          spr = theme === "CASTLE"
            ? (((e.anim >> 4) & 1) ? SPRITES.ce1 : SPRITES.ce0)
            : (((e.anim >> 4) & 1) ? SPRITES.e1 : SPRITES.e0);
        } else if (e.type === 1) {
          spr = theme === "CASTLE" ? (f ? SPRITES.cb1 : SPRITES.cb0) : (f ? SPRITES.ba1 : SPRITES.ba0);
        } else if (e.type === 2) {
          spr = theme === "CASTLE" ? (f ? SPRITES.cf1 : SPRITES.cf0) : (f ? SPRITES.fa1 : SPRITES.fa0);
        } else {
          spr = theme === "CASTLE" ? (f ? SPRITES.cg1 : SPRITES.cg0) : (f ? SPRITES.ga1 : SPRITES.ga0);
        }
        this.drawSprite(spr, e.x - this.cameraX, e.y - this.cameraY, 1);
        if (theme === "SPACE" && e.type) this.drawSpaceThruster(e);
      }

      const p = this.player;
      const px = p.x - this.cameraX;
      const py = p.y - this.cameraY;

      if (p.face < 0) {
        gfx.save();
        gfx.translate(((px + p.w) | 0), (py | 0));
        gfx.scale(-1, 1);
        this.drawPlayer(0, 0);
        gfx.restore();
      } else {
        this.drawPlayer(px, py);
      }

      if (this.levelNameBanner) {
        gfx.fillStyle = "#000a";
        gfx.fillRect(78, 62, 164, 28);
        gfx.fillStyle = "#fff";
        gfx.font = "14px monospace";
        gfx.fillText(LEVEL_NAMES[this.levelIndex], 94, 82);
      }

      if (this.helpTimer > 0) {
        gfx.fillStyle = "#000c";
        gfx.fillRect(16, 22, 288, 70);
        gfx.fillStyle = "#fff";
        gfx.font = "10px monospace";
        gfx.fillText("SPECIAL KEYS", 112, 36);
        gfx.fillText("MOVE: Arrows / A,D", 24, 50);
        gfx.fillText("JUMP: Space / Up", 168, 50);
        gfx.fillText("Z: Switch Character", 24, 62);
        gfx.fillText("R: Restart   N: Next", 168, 62);
        gfx.fillText("M: Mute Audio", 24, 74);
      }

      gfx.fillStyle = "#0008";
      gfx.fillRect(0, 0, CANVAS_W, 14);
      gfx.fillStyle = "#fff";
      gfx.font = "10px monospace";
      gfx.fillText("SCORE " + this.score, 6, 11);
      gfx.fillText("LIVES " + this.lives, 92, 11);
      gfx.fillText(LEVEL_NAMES[this.levelIndex], 152, 11);
      gfx.fillText(CHARACTERS[this.characterIndex].name, 210, 11);
      if (this.audio.muted) gfx.fillText("MUTE", CANVAS_W - 34, 11);
    }
  }

  const game = new Game();

  let last = performance.now();
  let acc = 0;

  const loop = (now) => {
    acc += Math.min(0.05, (now - last) / 1000);
    last = now;
    while (acc >= FIXED_DT) { game.step(); acc -= FIXED_DT; }
    game.render();
    requestAnimationFrame(loop);
  };

  requestAnimationFrame(loop);
})();
</script>
