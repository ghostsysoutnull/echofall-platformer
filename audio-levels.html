<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Level Tracks (Procedural WebAudio)</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 16px; }
    button, select { font-size: 16px; padding: 10px 14px; margin: 6px 10px 6px 0; }
    label { margin-left: 10px; }
    #status { margin-top: 10px; opacity: .8; }
  </style>
</head>
<body>
  <div>
    <button id="startBtn">Enable Audio</button>
    <button id="stopBtn">Stop</button>

    <select id="levelSel"></select>
    <button id="playBtn">Play Level Track</button>
    <button id="prevBtn">Prev</button>
    <button id="nextBtn">Next</button>

    <label><input id="mute" type="checkbox" /> Mute</label>
  </div>
  <div id="status"></div>

<script>
const LEVEL_ORDER = ["DAY", "JUNGLE", "FACTORY", "ICE", "VOLCANO", "NITE", "SPACE_01"];

/**
 * One procedural "track" per level name in LEVEL_ORDER.
 * Each track is a function: (ctx, bus, aux) => { nodes: [], timers: [] }
 * - bus: gain node already connected to master (your "track channel")
 * - aux: helper routing like delay (optional)
 */

class LevelAudio {
  constructor() {
    this.ctx = null;
    this.master = null;

    this.current = null; // { level, gain, track: {nodes,timers}, startedAt }
    this.isMuted = false;
  }

  async ensureStartedFromUserGesture() {
    if (!this.ctx) {
      const AudioCtx = window.AudioContext || window.webkitAudioContext;
      this.ctx = new AudioCtx();

      this.master = this.ctx.createGain();
      this.master.gain.value = 0.9;
      this.master.connect(this.ctx.destination);

      document.addEventListener("visibilitychange", async () => {
        if (!this.ctx) return;
        if (!document.hidden && this.ctx.state === "suspended") {
          try { await this.ctx.resume(); } catch {}
        }
      });
    }
    if (this.ctx.state === "suspended") await this.ctx.resume();
  }

  setMute(muted) {
    this.isMuted = muted;
    if (this.master) this.master.gain.value = muted ? 0 : 0.9;
  }

  stop({ fadeMs = 600 } = {}) {
    if (!this.ctx || !this.current) return;
    this._fadeGain(this.current.gain, 0.0, fadeMs);
    this._cleanupTrackLater(this.current, fadeMs);
    this.current = null;
  }

  playLevel(level, { fadeInMs = 900, crossFadeMs = 600 } = {}) {
    if (!this.ctx) throw new Error("Call ensureStartedFromUserGesture() first.");

    const now = this.ctx.currentTime;

    // Create next bus
    const gain = this.ctx.createGain();
    gain.gain.value = 0.0001;
    gain.connect(this.master);

    // Optional shared spatial delay per-track (very light)
    const aux = this._makeDelay({
      time: level === "FACTORY" ? 0.12 : 0.22,
      feedback: level === "VOLCANO" ? 0.28 : 0.20,
      mix: 0.22,
      dest: gain
    });

    // Build track
    const maker = TRACKS[level] || TRACKS.SPACE_01;
    const track = maker(this.ctx, gain, aux);

    const next = { level, gain, track, startedAt: now };

    // Fade in next
    this._fadeGain(gain, 1.0, fadeInMs);

    // Crossfade out previous
    const prev = this.current;
    if (prev) {
      this._fadeGain(prev.gain, 0.0, crossFadeMs);
      this._cleanupTrackLater(prev, crossFadeMs);
    }

    this.current = next;
  }

  // ---------- helpers ----------
  _fadeGain(g, value, ms) {
    const t = this.ctx.currentTime;
    g.gain.cancelScheduledValues(t);
    g.gain.setValueAtTime(g.gain.value, t);
    g.gain.linearRampToValueAtTime(value, t + ms / 1000);
  }

  _cleanupTrackLater(wrapper, fadeMs) {
    const stopAt = this.ctx.currentTime + fadeMs / 1000 + 0.05;
    // stop timers
    for (const id of (wrapper.track?.timers || [])) clearInterval(id);

    // stop nodes
    for (const n of (wrapper.track?.nodes || [])) {
      try { if (typeof n.stop === "function") n.stop(stopAt); } catch {}
      try { if (typeof n.disconnect === "function") n.disconnect(); } catch {}
    }
    // disconnect bus later (best-effort)
    try { wrapper.gain.disconnect(); } catch {}
  }

  _makeNoiseSource(seconds = 1.0, amp = 0.35) {
    const sr = this.ctx.sampleRate;
    const len = Math.max(1, Math.floor(sr * seconds));
    const buffer = this.ctx.createBuffer(1, len, sr);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * amp;
    const src = this.ctx.createBufferSource();
    src.buffer = buffer;
    src.loop = true;
    return src;
  }

  _makeDelay({ time = 0.22, feedback = 0.20, mix = 0.22, dest }) {
    const delay = this.ctx.createDelay(1.0);
    delay.delayTime.value = time;

    const fb = this.ctx.createGain();
    fb.gain.value = feedback;

    delay.connect(fb);
    fb.connect(delay);

    const mixGain = this.ctx.createGain();
    mixGain.gain.value = mix;

    delay.connect(mixGain);
    mixGain.connect(dest);

    return { delay, fb, mixGain };
  }

  // quick ping helper (used by multiple tracks)
  ping({ freq = 440, type = "sine", peak = 0.18, dur = 0.35, lpHz = 2200, toDelay = false, bus, aux }) {
    const now = this.ctx.currentTime;

    const osc = this.ctx.createOscillator();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, now);

    const g = this.ctx.createGain();
    g.gain.setValueAtTime(0.0001, now);
    g.gain.exponentialRampToValueAtTime(peak, now + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, now + dur);

    const lp = this.ctx.createBiquadFilter();
    lp.type = "lowpass";
    lp.frequency.value = lpHz;
    lp.Q.value = 0.9;

    osc.connect(g);
    g.connect(lp);
    lp.connect(bus);
    if (toDelay && aux?.delay) lp.connect(aux.delay);

    osc.start(now);
    osc.stop(now + dur + 0.2);

    return [osc, g, lp];
  }
}

const audio = new LevelAudio();

// ---------- track builders ----------
const TRACKS = {
  DAY: (ctx, bus, aux) => {
    // bright pad + gentle birds
    const nodes = [];
    const timers = [];

    const padGain = ctx.createGain();
    padGain.gain.value = 0.30;
    padGain.connect(bus);

    const lp = ctx.createBiquadFilter();
    lp.type = "lowpass";
    lp.frequency.value = 1800;
    lp.Q.value = 0.6;
    padGain.disconnect();
    padGain.connect(lp);
    lp.connect(bus);

    // 3-voice major-ish chord (C-E-G) down low
    const freqs = [130.81, 164.81, 196.00];
    for (let i = 0; i < freqs.length; i++) {
      const o = ctx.createOscillator();
      o.type = i === 0 ? "triangle" : "sine";
      o.frequency.value = freqs[i] * (i === 2 ? 0.5 : 1);
      o.connect(padGain);
      o.start();
      nodes.push(o);
    }

    // slow shimmer tremolo
    const trem = ctx.createOscillator();
    trem.type = "sine";
    trem.frequency.value = 0.08;
    const tremAmt = ctx.createGain();
    tremAmt.gain.value = 0.10;
    trem.connect(tremAmt);
    tremAmt.connect(padGain.gain);
    trem.start();
    nodes.push(padGain, lp, trem, tremAmt);

    // bird chirps
    const id = setInterval(() => {
      if (Math.random() < 0.65) {
        const choices = [1760, 1976, 2093, 2349, 2637];
        const f = choices[(Math.random() * choices.length) | 0] * (Math.random() < 0.4 ? 0.5 : 1);
        nodes.push(...audio.ping({ freq: f, type: "sine", peak: 0.08, dur: 0.18, lpHz: 6000, toDelay: false, bus, aux }));
      }
    }, 1200);
    timers.push(id);

    return { nodes, timers };
  },

  JUNGLE: (ctx, bus, aux) => {
    // humid drone + filtered noise + wood ticks
    const nodes = [];
    const timers = [];

    // drone
    const droneGain = ctx.createGain();
    droneGain.gain.value = 0.34;

    const bp = ctx.createBiquadFilter();
    bp.type = "bandpass";
    bp.frequency.value = 420;
    bp.Q.value = 0.9;

    droneGain.connect(bp);
    bp.connect(bus);

    const o1 = ctx.createOscillator();
    o1.type = "triangle";
    o1.frequency.value = 55;

    const o2 = ctx.createOscillator();
    o2.type = "sine";
    o2.frequency.value = 55 * 1.01;

    o1.connect(droneGain);
    o2.connect(droneGain);
    o1.start(); o2.start();
    nodes.push(droneGain, bp, o1, o2);

    // noise "air"
    const noise = audio._makeNoiseSource(1.0, 0.28);
    const nlp = ctx.createBiquadFilter();
    nlp.type = "lowpass";
    nlp.frequency.value = 1200;
    nlp.Q.value = 0.7;

    const nGain = ctx.createGain();
    nGain.gain.value = 0.14;

    noise.connect(nlp);
    nlp.connect(nGain);
    nGain.connect(bus);

    noise.start();
    nodes.push(noise, nlp, nGain);

    // wood ticks (short pings)
    const id = setInterval(() => {
      if (Math.random() < 0.75) {
        const f = 300 + Math.random() * 450;
        nodes.push(...audio.ping({ freq: f, type: "triangle", peak: 0.07, dur: 0.12, lpHz: 1800, toDelay: Math.random() < 0.25, bus, aux }));
      }
    }, 700);
    timers.push(id);

    return { nodes, timers };
  },

  FACTORY: (ctx, bus, aux) => {
    // rhythmic pulses + metallic bandpass noise
    const nodes = [];
    const timers = [];

    const pulseGain = ctx.createGain();
    pulseGain.gain.value = 0.0001;
    pulseGain.connect(bus);

    const osc = ctx.createOscillator();
    osc.type = "sawtooth";
    osc.frequency.value = 110;
    osc.connect(pulseGain);
    osc.start();
    nodes.push(osc, pulseGain);

    // "machine" filter sweep
    const bp = ctx.createBiquadFilter();
    bp.type = "bandpass";
    bp.frequency.value = 800;
    bp.Q.value = 2.0;
    pulseGain.disconnect();
    pulseGain.connect(bp);
    bp.connect(bus);
    nodes.push(bp);

    const lfo = ctx.createOscillator();
    lfo.type = "square";
    lfo.frequency.value = 0.5;
    const lfoAmt = ctx.createGain();
    lfoAmt.gain.value = 350;
    lfo.connect(lfoAmt);
    lfoAmt.connect(bp.frequency);
    lfo.start();
    nodes.push(lfo, lfoAmt);

    // metallic noise layer
    const noise = audio._makeNoiseSource(1.0, 0.30);
    const nbp = ctx.createBiquadFilter();
    nbp.type = "bandpass";
    nbp.frequency.value = 2200;
    nbp.Q.value = 6.0;

    const nGain = ctx.createGain();
    nGain.gain.value = 0.10;

    noise.connect(nbp);
    nbp.connect(nGain);
    nGain.connect(bus);
    noise.start();
    nodes.push(noise, nbp, nGain);

    // rhythmic gate (simple)
    const id = setInterval(() => {
      const now = ctx.currentTime;
      // 4-on-the-floor-ish
      pulseGain.gain.cancelScheduledValues(now);
      pulseGain.gain.setValueAtTime(0.0001, now);
      pulseGain.gain.exponentialRampToValueAtTime(0.22, now + 0.01);
      pulseGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.10);

      if (Math.random() < 0.35) {
        // occasional clang ping
        const f = 500 + Math.random() * 900;
        nodes.push(...audio.ping({ freq: f, type: "triangle", peak: 0.10, dur: 0.20, lpHz: 2600, toDelay: true, bus, aux }));
      }
    }, 430);
    timers.push(id);

    return { nodes, timers };
  },

  ICE: (ctx, bus, aux) => {
    // airy noise + bell pings + slow pad
    const nodes = [];
    const timers = [];

    // airy hiss
    const noise = audio._makeNoiseSource(1.0, 0.25);
    const hp = ctx.createBiquadFilter();
    hp.type = "highpass";
    hp.frequency.value = 900;
    hp.Q.value = 0.7;

    const airGain = ctx.createGain();
    airGain.gain.value = 0.12;

    noise.connect(hp);
    hp.connect(airGain);
    airGain.connect(bus);
    noise.start();
    nodes.push(noise, hp, airGain);

    // pad
    const padGain = ctx.createGain();
    padGain.gain.value = 0.22;
    padGain.connect(bus);

    const lp = ctx.createBiquadFilter();
    lp.type = "lowpass";
    lp.frequency.value = 1400;
    lp.Q.value = 0.6;
    padGain.disconnect();
    padGain.connect(lp);
    lp.connect(bus);

    const freqs = [246.94, 311.13, 369.99]; // Bm-ish color
    for (let i = 0; i < freqs.length; i++) {
      const o = ctx.createOscillator();
      o.type = "sine";
      o.frequency.value = freqs[i] * 0.5;
      o.connect(padGain);
      o.start();
      nodes.push(o);
    }
    nodes.push(padGain, lp);

    // bell pings
    const id = setInterval(() => {
      if (Math.random() < 0.55) {
        const choices = [523.25, 659.25, 783.99, 1046.5];
        const f = choices[(Math.random() * choices.length) | 0] * (Math.random() < 0.35 ? 0.5 : 1);
        nodes.push(...audio.ping({ freq: f, type: "sine", peak: 0.10, dur: 0.45, lpHz: 5000, toDelay: true, bus, aux }));
      }
    }, 1100);
    timers.push(id);

    return { nodes, timers };
  },

  VOLCANO: (ctx, bus, aux) => {
    // sub rumble + distortion + crackle pings
    const nodes = [];
    const timers = [];

    const rumbleGain = ctx.createGain();
    rumbleGain.gain.value = 0.40;

    const sub = ctx.createOscillator();
    sub.type = "sine";
    sub.frequency.value = 33;

    // waveshaper for grit
    const shaper = ctx.createWaveShaper();
    shaper.curve = makeDistortionCurve(220);
    shaper.oversample = "2x";

    const lp = ctx.createBiquadFilter();
    lp.type = "lowpass";
    lp.frequency.value = 900;
    lp.Q.value = 0.8;

    sub.connect(rumbleGain);
    rumbleGain.connect(shaper);
    shaper.connect(lp);
    lp.connect(bus);

    sub.start();
    nodes.push(rumbleGain, sub, shaper, lp);

    // crackle noise
    const noise = audio._makeNoiseSource(1.0, 0.34);
    const nbp = ctx.createBiquadFilter();
    nbp.type = "bandpass";
    nbp.frequency.value = 1800;
    nbp.Q.value = 2.8;

    const nGain = ctx.createGain();
    nGain.gain.value = 0.10;

    noise.connect(nbp);
    nbp.connect(nGain);
    nGain.connect(bus);
    noise.start();
    nodes.push(noise, nbp, nGain);

    // ember pings
    const id = setInterval(() => {
      if (Math.random() < 0.60) {
        const f = 180 + Math.random() * 220;
        nodes.push(...audio.ping({ freq: f, type: "triangle", peak: 0.10, dur: 0.20, lpHz: 1400, toDelay: Math.random() < 0.30, bus, aux }));
      }
    }, 800);
    timers.push(id);

    return { nodes, timers };
  },

  NITE: (ctx, bus, aux) => {
    // soft minor pad + crickets
    const nodes = [];
    const timers = [];

    const padGain = ctx.createGain();
    padGain.gain.value = 0.26;
    padGain.connect(bus);

    const lp = ctx.createBiquadFilter();
    lp.type = "lowpass";
    lp.frequency.value = 1200;
    lp.Q.value = 0.7;
    padGain.disconnect();
    padGain.connect(lp);
    lp.connect(bus);

    const freqs = [110, 130.81, 164.81]; // A + C + E-ish
    for (let i = 0; i < freqs.length; i++) {
      const o = ctx.createOscillator();
      o.type = "sine";
      o.frequency.value = freqs[i];
      o.connect(padGain);
      o.start();
      nodes.push(o);
    }
    nodes.push(padGain, lp);

    // crickets: tiny noise bursts filtered
    const id = setInterval(() => {
      if (Math.random() < 0.8) {
        const f = 2500 + Math.random() * 1500;
        nodes.push(...audio.ping({ freq: f, type: "sine", peak: 0.05, dur: 0.08, lpHz: 6000, toDelay: false, bus, aux }));
      }
    }, 500);
    timers.push(id);

    return { nodes, timers };
  },

  SPACE_01: (ctx, bus, aux) => {
    // (your original vibe) drones + dust + occasional blips + delay
    const nodes = [];
    const timers = [];

    // Drone filter
    const droneLP = ctx.createBiquadFilter();
    droneLP.type = "lowpass";
    droneLP.frequency.value = 800;
    droneLP.Q.value = 0.7;

    const droneGain = ctx.createGain();
    droneGain.gain.value = 0.35;

    droneGain.connect(droneLP);
    droneLP.connect(bus);

    // LFO sweep
    const lfo = ctx.createOscillator();
    lfo.type = "sine";
    lfo.frequency.value = 0.03;
    const lfoAmt = ctx.createGain();
    lfoAmt.gain.value = 550;
    lfo.connect(lfoAmt);
    lfoAmt.connect(droneLP.frequency);
    lfo.start();

    // Two detuned oscillators
    const baseHz = 55;
    const o1 = ctx.createOscillator();
    o1.type = "triangle";
    o1.frequency.value = baseHz;

    const o2 = ctx.createOscillator();
    o2.type = "sine";
    o2.frequency.value = baseHz * 1.005;

    // Drift
    const drift = ctx.createOscillator();
    drift.type = "sine";
    drift.frequency.value = 0.015;
    const driftAmt = ctx.createGain();
    driftAmt.gain.value = 0.25;
    drift.connect(driftAmt);
    driftAmt.connect(o2.detune);
    drift.start();

    o1.connect(droneGain);
    o2.connect(droneGain);
    o1.start(); o2.start();

    nodes.push(droneLP, droneGain, lfo, lfoAmt, drift, driftAmt, o1, o2);

    // Dust noise
    const noise = audio._makeNoiseSource(1.0, 0.35);
    const bp = ctx.createBiquadFilter();
    bp.type = "bandpass";
    bp.frequency.value = 1200;
    bp.Q.value = 1.2;

    const dustGain = ctx.createGain();
    dustGain.gain.value = 0.12;

    const dustLfo = ctx.createOscillator();
    dustLfo.type = "sine";
    dustLfo.frequency.value = 0.025;

    const dustAmt = ctx.createGain();
    dustAmt.gain.value = 700;

    dustLfo.connect(dustAmt);
    dustAmt.connect(bp.frequency);
    dustLfo.start();

    noise.connect(bp);
    bp.connect(dustGain);
    dustGain.connect(bus);
    noise.start();

    nodes.push(noise, bp, dustGain, dustLfo, dustAmt);

    // Random blips
    const id = setInterval(() => {
      if (Math.random() < 0.40) {
        const choices = [220, 247, 262, 294, 330, 392];
        const f = choices[(Math.random() * choices.length) | 0] * (Math.random() < 0.25 ? 2 : 1);
        nodes.push(...audio.ping({ freq: f, type: Math.random() < 0.5 ? "sine" : "triangle", peak: 0.18, dur: 0.35, lpHz: 2200, toDelay: true, bus, aux }));
      }
    }, 1200);
    timers.push(id);

    return { nodes, timers };
  }
};

function makeDistortionCurve(amount) {
  // classic waveshaper curve
  const n = 44100;
  const curve = new Float32Array(n);
  const k = typeof amount === "number" ? amount : 50;
  const deg = Math.PI / 180;
  for (let i = 0; i < n; i++) {
    const x = (i * 2) / n - 1;
    curve[i] = (3 + k) * x * 20 * deg / (Math.PI + k * Math.abs(x));
  }
  return curve;
}

// ---------- UI wiring ----------
const status = document.getElementById("status");
const levelSel = document.getElementById("levelSel");

LEVEL_ORDER.forEach(l => {
  const opt = document.createElement("option");
  opt.value = l;
  opt.textContent = l;
  levelSel.appendChild(opt);
});

let levelIndex = 0;
levelSel.value = LEVEL_ORDER[levelIndex];

function setLevel(i) {
  levelIndex = (i + LEVEL_ORDER.length) % LEVEL_ORDER.length;
  levelSel.value = LEVEL_ORDER[levelIndex];
}

document.getElementById("startBtn").addEventListener("click", async () => {
  await audio.ensureStartedFromUserGesture();
  status.textContent = "Audio enabled. Pick a level and hit Play.";
});

document.getElementById("playBtn").addEventListener("click", async () => {
  await audio.ensureStartedFromUserGesture();
  const level = levelSel.value;
  audio.playLevel(level);
  status.textContent = `Playing track: ${level}`;
});

document.getElementById("stopBtn").addEventListener("click", () => {
  audio.stop();
  status.textContent = "Stopped.";
});

document.getElementById("prevBtn").addEventListener("click", () => setLevel(levelIndex - 1));
document.getElementById("nextBtn").addEventListener("click", () => setLevel(levelIndex + 1));

levelSel.addEventListener("change", () => {
  levelIndex = LEVEL_ORDER.indexOf(levelSel.value);
});

document.getElementById("mute").addEventListener("change", (e) => {
  audio.setMute(e.target.checked);
  status.textContent = e.target.checked ? "Muted." : `Unmuted.`;
});
</script>
</body>
</html>
