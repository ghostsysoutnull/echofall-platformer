  class AudioSystem {
    constructor() {
      this.audioCtx = null;
      this.muted = 0;
    }
    ensureContext() {
      if (this.audioCtx) return;
      this.audioCtx = new (AudioContext || webkitAudioContext)();
      this.audioCtx.resume && this.audioCtx.resume();
    }
    toggleMute() { this.muted ^= 1; }
    playTone(freq, time, at = 0, type = "square") {
      if (this.muted || !this.audioCtx) return;
      const o = this.audioCtx.createOscillator();
      const g = this.audioCtx.createGain();
      const start = this.audioCtx.currentTime + at;
      o.type = type;
      o.frequency.setValueAtTime(freq, start);
      g.gain.setValueAtTime(0.06, start);
      o.connect(g);
      g.connect(this.audioCtx.destination);
      o.start(start);
      o.stop(start + time);
    }
    lifeSound() {
      this.playTone(880, 0.06, 0);
      this.playTone(1175, 0.06, 0.07);
      this.playTone(1760, 0.08, 0.14);
    }
    quack() {
      this.playTone(560, 0.05, 0, "square");

      this.playTone(240, 0.08, 0.08, "triangle");
    }
  }

  class Input {
    constructor(audio) {
      this.audio = audio;
      this.keyDown = {};
      this.jumpBuffered = 0;

      const allowed = new Set(["ArrowLeft","ArrowRight","ArrowUp","Space","KeyA","KeyD","KeyM","KeyZ","KeyR"]);
      addEventListener("keydown", (e) => {
        if (allowed.has(e.code)) e.preventDefault();

        if (!this.keyDown[e.code]) {
          if (e.code === "Space" || e.code === "ArrowUp") this.jumpBuffered = BUF;
          this.audio.ensureContext();
        }
        this.keyDown[e.code] = 1;
      });

      addEventListener("keyup", (e) => {
        if (allowed.has(e.code)) e.preventDefault();
        this.keyDown[e.code] = 0;
      });
    }
    consumeJumpBuffer() {
      const v = this.jumpBuffered;
      if (v) this.jumpBuffered = 0;
      return v;
    }
    tickJumpBuffer() {
      this.jumpBuffered = Math.max(0, this.jumpBuffered - 1);
    }
  }

  class Level {
    constructor(levelIndex) {
      this.levelIndex = levelIndex;
      this.tiles = LEVELS[levelIndex].map(r => r.split(""));
      this.height = this.tiles.length;
      this.width = this.tiles[0].length;
    }
    tileIdAt(tx, ty) {
      if (tx < 0 || tx >= this.width) return 1;
      if (ty < 0 || ty >= this.height) return 0;
      const ch = this.tiles[ty][tx];
      return ch === "." ? 0 :
             ch === "#" ? 1 :
             ch === "B" ? 4 :
             ch === "o" ? 2 :
             ch === "O" ? 5 :
             ch === "F" ? 3 :
             ch === "U" ? 6 :
             ch === "L" ? 7 : 0;
    }
    setTile(tx, ty, v) {
      if (tx >= 0 && tx < this.width && ty >= 0 && ty < this.height) this.tiles[ty][tx] = v;
    }
    isSolid(tileId) { return tileId === 1 || tileId === 4; }
  }

  class Renderer {
    constructor(gfx) { this.gfx = gfx; }
    drawSpritePixels(sprite, x, y, scale) {
      const g = this.gfx;
      const px = x | 0, py = y | 0;
      let current = "";
      for (let r = 0; r < sprite.length; r++) {
        const row = sprite[r];
        for (let i = 0; i < row.length; i++) {
          const ch = row[i];
          if (ch === ".") continue;
          const col = pal[ch];
          if (col !== current) { current = col; g.fillStyle = current; }
          g.fillRect(px + i * scale, py + r * scale, scale, scale);
        }
      }
    }
  }

  class Game {
    constructor(canvas, gfx) {
      this.canvas = canvas;
      this.gfx = gfx;
      this.renderer = new Renderer(gfx);
      this.audio = new AudioSystem();
      this.input = new Input(this.audio);

      this.levelIndex = 0;
      this.characterIndex = 0;
      this.skeletonUnlocked = 0;

      this.seed = 1337;
      this.rng = 1;
      this.msg = 0;

      this.camx = 0;
      this.camy = 0;

      this.score = 0;
      this.lives = 3;
      this.nextLife = 100;

      this.stars = this.createStars();

      this.level = null;
      this.player = null;
      this.enemies = [];
      this.drops = [];

      this.fit();
      addEventListener("resize", () => this.fit());

      this.loadLevel(0);
    }

    createStars() {
      const stars = [];
      for (let i = 0; i < 90; i++) {
        this.seed = (this.seed * 1664525 + 1013904223) >>> 0;
        const x = this.seed % 2600;
        this.seed = (this.seed * 1664525 + 1013904223) >>> 0;
        const y = this.seed % 150;
        this.seed = (this.seed * 1664525 + 1013904223) >>> 0;
        const s = 1 + (this.seed % 2);
        stars.push([x, y, s]);
      }
      return stars;
    }

    rnd() {
      this.rng ^= this.rng << 13;
      this.rng ^= this.rng >>> 17;
      this.rng ^= this.rng << 5;
      return (this.rng >>> 0) / 4294967296;
    }

    fit() {
      const s = Math.max(1, Math.floor(Math.min(innerWidth / W, innerHeight / H)));
      this.canvas.style.width = W * s + "px";
      this.canvas.style.height = H * s + "px";
    }

    setCharacter(index) {
      const oldW = this.player ? this.player.w : 10;
      const oldH = this.player ? this.player.h : 10;

      this.characterIndex = index;

      if (!this.player) return;

      const ch = CHARACTERS[this.characterIndex];
      const newW = ch.w, newH = ch.h;

      this.player.x += oldW * 0.5 - newW * 0.5;
      this.player.y += oldH - newH;
      this.player.w = newW;
      this.player.h = newH;

      this.player.q = 0;
      this.player.jl = ch.doubleJumps;
      this.player.ft = ch.flyTicks;
      this.player.fly = 0;
    }

    loadLevel(index) {
      this.levelIndex = index;
      this.rng = 1234567 + (this.levelIndex + 1) * 99991;

      this.level = new Level(this.levelIndex);
      this.enemies = [];
      this.drops = [];

      let spawnX = 10, spawnY = 10;

      for (let y = 0; y < this.level.height; y++) {
        for (let x = 0; x < this.level.width; x++) {
          const ch = this.level.tiles[y][x];

          if (ch === "S") {
            spawnX = x * TS;
            spawnY = y * TS;
            this.level.tiles[y][x] = ".";
          } else if (ch === "E") {
            this.enemies.push({ t: 0, x: x * TS, y: y * TS, vx: 0, vy: 0, w: 10, h: 10, dir: -1, ong: 0, dead: 0, a: 0 });
            this.level.tiles[y][x] = ".";
          } else if (ch === "V") {
            this.enemies.push({ t: 1, x: x * TS, y: y * TS, by: y * TS, vx: 0, vy: 0, w: 10, h: 10, dir: 1, ong: 0, dead: 0, a: 0 });
            this.level.tiles[y][x] = ".";
          }
        }
      }

      this.player = { x: spawnX, y: spawnY, vx: 0, vy: 0, w: 10, h: 10, ong: 0, c: 0, b: 0, face: 1, a: 0, wr: 0, q: 0, jl: 0, ft: 0, fly: 0 };
      this.setCharacter(this.characterIndex);

      this.camx = 0;
      this.camy = 0;
      this.msg = 90;
    }

    solid(tileId) { return this.level.isSolid(tileId); }

    collideX(e) {
      if (!e.vx) return;

      const dir = e.vx > 0 ? 1 : -1;
      const probeX = dir > 0 ? e.x + e.w : e.x;
      const tx = (probeX / TS) | 0;
      const y0 = (e.y / TS) | 0;
      const y1 = ((e.y + e.h - 1) / TS) | 0;

      for (let ty = y0; ty <= y1; ty++) {
        if (this.solid(this.level.tileIdAt(tx, ty))) {
          e.x = dir > 0 ? tx * TS - e.w - 0.001 : (tx + 1) * TS + 0.001;
          e.vx = 0;
          if (e.dir) e.dir *= -1;
          break;
        }
      }
    }

    collideY(e) {
      e.ong = 0;
      if (!e.vy) return;

      const dir = e.vy > 0 ? 1 : -1;
      const probeY = dir > 0 ? e.y + e.h : e.y;
      const ty = (probeY / TS) | 0;
      const x0 = (e.x / TS) | 0;
      const x1 = ((e.x + e.w - 1) / TS) | 0;

      for (let tx = x0; tx <= x1; tx++) {
        if (this.solid(this.level.tileIdAt(tx, ty))) {
          e.y = dir > 0 ? ty * TS - e.h - 0.001 : (ty + 1) * TS + 0.001;
          e.vy = 0;
          if (dir > 0) e.ong = 1;
          break;
        }
      }
    }

    moveAndCollide(e) {
      e.x += e.vx;
      this.collideX(e);
      e.y += e.vy;
      this.collideY(e);
    }

    columnHasGround(tx) {
      return this.solid(this.level.tileIdAt(tx, this.level.height - 1));
    }

    safeColumn() {
      const playerCenterTx = ((this.player.x + this.player.w * 0.5) / TS) | 0;
      if (this.columnHasGround(playerCenterTx)) return playerCenterTx;

      for (let d = 1; d < this.level.width; d++) {
        const a = playerCenterTx + d;
        const b = playerCenterTx - d;
        if (a < this.level.width && this.columnHasGround(a)) return a;
        if (b >= 0 && this.columnHasGround(b)) return b;
      }
      return playerCenterTx;
    }

    wrapToTop() {
      const tx = this.safeColumn();
      const p = this.player;
      p.x = clamp(tx * TS + TS * 0.5 - p.w * 0.5, 0, this.level.width * TS - p.w - 0.001);
      p.y = -p.h - 12;
      p.vy = 0;
      p.c = 0;
      p.b = 0;
      p.ong = 0;
      p.fly = 0;

      const ch = CHARACTERS[this.characterIndex];
      p.ft = ch.flyTicks;
      p.jl = ch.doubleJumps;

      p.vx *= 0.6;
      p.wr = 26;

      this.audio.playTone(300, 0.04);
    }

    die(reset) {
      if (!reset) this.lives--;
      this.audio.playTone(120, 0.10);

      if (this.lives < 0) {
        this.lives = 3;
        this.score = 0;
        this.nextLife = 100;
        this.skeletonUnlocked = 0;
        this.characterIndex = 0;
        this.loadLevel(0);
      } else {
        this.loadLevel(this.levelIndex);
      }
    }

    win() {
      this.audio.playTone(980, 0.10);

      if (this.levelIndex === LEVELS.length - 1) {
        this.skeletonUnlocked = 1;
        this.loadLevel(0);
      } else {
        this.loadLevel(this.levelIndex + 1);
      }
    }

    addScore(v) {
      this.score += v;
      while (this.score >= this.nextLife) {
        this.lives++;
        this.nextLife += 100;
        this.audio.lifeSound();
      }
    }

    dropCoins(x, y) {
      const n = 5 + ((this.rnd() * 6) | 0);
      for (let i = 0; i < n; i++) {
        const a = this.rnd() * 6.283;
        const v = (this.rnd() * 1.2 + 0.4);
        this.drops.push({
          x: x + 2, y: y - 6,
          vx: Math.cos(a) * v,
          vy: -2.2 - this.rnd() * 1.2,
          w: 10, h: 10, ong: 0, t: 240
        });
      }
    }

    collectTiles() {
      const p = this.player;
      const x0 = (p.x / TS) | 0;
      const x1 = ((p.x + p.w - 1) / TS) | 0;
      const y0 = (p.y / TS) | 0;
      const y1 = ((p.y + p.h - 1) / TS) | 0;

      for (let y = y0; y <= y1; y++) {
        for (let x = x0; x <= x1; x++) {
          const id = this.level.tileIdAt(x, y);

          if (id === 7) return this.die(0);

          if (id === 2) {
            this.level.setTile(x, y, ".");
            this.addScore(1);
            this.audio.playTone(740, 0.03);
          } else if (id === 5) {
            this.level.setTile(x, y, ".");
            this.addScore(10);
            this.audio.playTone(1040, 0.05);
          } else if (id === 6) {
            this.level.setTile(x, y, ".");
            this.lives++;
            this.audio.lifeSound();
          } else if (id === 3) {
            this.win();
          }
        }
      }
    }

    coinSprite(tileId) {
      if (tileId === 2) {
        return this.levelIndex === 1 ? S.fruit : this.levelIndex === 2 ? S.gear : this.levelIndex === 3 ? S.gem : S.coin;
      }
      return this.levelIndex === 1 ? S.bfruit : this.levelIndex === 2 ? S.bgear : this.levelIndex === 3 ? S.bgem : S.bcoin;
    }

    // Backgrounds (pixel-identical logic, reorganized)
    drawBackground() {
      const g = this.gfx;
      const camx = this.camx;

      if (this.levelIndex === 0) {
        g.fillStyle = "#6bb7ff";
        g.fillRect(0, 0, W, H);
        const bx = ((camx * 0.3) | 0) % W;
        g.fillStyle = "#bfe6ff";
        for (let i = -1; i < 3; i++) {
          const x = i * W - bx;
          g.fillRect(x + 40, 20, 50, 12);
          g.fillRect(x + 65, 14, 30, 10);
          g.fillRect(x + 170, 36, 70, 14);
          g.fillRect(x + 200, 30, 40, 10);
        }
        return;
      }

      if (this.levelIndex === 1) {
        g.fillStyle = "#49c7b6";
        g.fillRect(0, 0, W, H);

        const p1 = ((camx * 0.18) | 0) % W;
        const p2 = ((camx * 0.35) | 0) % W;

        g.fillStyle = "#2a8f5a";
        for (let i = -1; i < 3; i++) {
          const x = i * W - p1;
          g.fillRect(x, 104, 210, 90);
          g.fillRect(x + 90, 92, 230, 100);
          g.fillRect(x + 170, 98, 160, 96);
        }

        g.fillStyle = "#165c35";
        for (let i = -1; i < 3; i++) {
          const x = i * W - p2;
          g.fillRect(x, 120, 240, 70);
          g.fillRect(x + 70, 108, 260, 82);
          g.fillRect(x + 170, 114, 200, 76);
        }

        g.fillStyle = "#0a2a18";
        for (let i = 0; i < 22; i++) {
          let x = ((i * 17 - (camx * 0.6)) | 0) % W;
          x = (x + W) % W;
          g.fillRect(x, 0, 6, 42);
        }
        return;
      }

      if (this.levelIndex === 2) {
        g.fillStyle = "#ffb36b";
        g.fillRect(0, 0, W, H);

        const p1 = ((camx * 0.2) | 0) % W;
        const p2 = ((camx * 0.45) | 0) % W;

        g.fillStyle = "#3a2a2a";
        for (let i = -1; i < 3; i++) {
          const x = i * W - p1;
          g.fillRect(x, 112, 260, 70);
          g.fillRect(x + 60, 96, 280, 86);
          g.fillRect(x + 180, 86, 170, 96);
        }

        g.fillStyle = "#1b1414";
        for (let i = -1; i < 3; i++) {
          const x = i * W - p2;
          g.fillRect(x, 128, 290, 62);
          g.fillRect(x + 80, 110, 300, 80);
        }

        g.fillStyle = "#ffffff10";
        for (let i = 0; i < 26; i++) {
          let x = ((i * 19 - (camx * 0.75)) | 0) % W;
          x = (x + W) % W;
          g.fillRect(x, 0, 6, 28);
        }

        g.fillStyle = "#00000010";
        for (let i = 0; i < 14; i++) {
          let x = ((i * 37 - (camx * 0.25)) | 0) % W;
          x = (x + W) % W;
          g.fillRect(x, 64, 12, 120);
        }
        return;
      }

      if (this.levelIndex === 3) {
        g.fillStyle = "#87c9ff";
        g.fillRect(0, 0, W, H);

        const p1 = ((camx * 0.18) | 0) % W;
        const p2 = ((camx * 0.33) | 0) % W;

        g.fillStyle = "#2a5a88";
        for (let i = -1; i < 3; i++) {
          const x = i * W - p1;
          g.fillRect(x, 112, 220, 80);
          g.fillRect(x + 80, 96, 260, 96);
        }

        g.fillStyle = "#163a66";
        for (let i = -1; i < 3; i++) {
          const x = i * W - p2;
          g.fillRect(x, 128, 260, 62);
          g.fillRect(x + 60, 110, 280, 80);
        }

        g.fillStyle = "#bfe9ff";
        for (let i = 0; i < 18; i++) {
          let x = ((i * 33 - (camx * 0.55)) | 0) % W;
          x = (x + W) % W;
          g.fillRect(x, 92, 6, 36);
          g.fillRect(x + 3, 104, 10, 6);
        }
        return;
      }

      if (this.levelIndex === 4) {
        g.fillStyle = "#260013";
        g.fillRect(0, 0, W, H);

        const p1 = ((camx * 0.2) | 0) % W;
        const p2 = ((camx * 0.45) | 0) % W;

        g.fillStyle = "#3b001c";
        for (let i = -1; i < 3; i++) {
          const x = i * W - p1;
          g.fillRect(x, 120, 280, 70);
          g.fillRect(x + 70, 105, 260, 85);
          g.fillRect(x + 190, 92, 170, 98);
        }

        g.fillStyle = "#12000a";
        for (let i = -1; i < 3; i++) {
          const x = i * W - p2;
          g.fillRect(x, 132, 320, 58);
          g.fillRect(x + 80, 114, 300, 76);
        }

        g.fillStyle = "#ff5a0030";
        for (let i = 0; i < 18; i++) {
          let x = ((i * 37 - (camx * 0.6)) | 0) % W;
          x = (x + W) % W;
          g.fillRect(x, 92, 10, 98);
        }

        g.fillStyle = "#ff6a0020";
        for (let i = 0; i < 28; i++) {
          let x = ((i * 19 - (camx * 0.9)) | 0) % W;
          x = (x + W) % W;
          g.fillRect(x, 0, 4, 28);
        }
        return;
      }

      // Night
      g.fillStyle = "#0b0f2a";
      g.fillRect(0, 0, W, H);

      g.fillStyle = "#a8c7ff";
      for (let i = 0; i < this.stars.length; i++) {
        const s = this.stars[i];
        let x = ((s[0] - camx * 0.10) | 0) % 2600;
        const y = s[1];
        x = ((x % W) + W) % W;
        g.fillRect(x, y, s[2], s[2]);
      }

      g.fillStyle = "#d9e6ff";
      g.beginPath();
      g.arc(W - 52, 36, 20, 0, 6.283);
      g.fill();

      g.fillStyle = "#0b0f2a";
      g.beginPath();
      g.arc(W - 44, 30, 18, 0, 6.283);
      g.fill();

      const sx = ((camx * 0.12) | 0) % W;
      g.fillStyle = "#050711";
      for (let i = -1; i < 3; i++) {
        const x = i * W - sx;
        g.fillRect(x, 110, 160, 70);
        g.fillRect(x + 40, 96, 110, 84);
        g.fillRect(x + 90, 86, 80, 94);
      }

      g.fillStyle = "#ffffff10";
      for (let i = -1; i < 3; i++) {
        const x = i * W - (((camx * 0.5) | 0) % W);
        g.fillRect(x, 122, 220, 6);
        g.fillRect(x + 60, 134, 240, 7);
      }
    }

    drawPlayer(px, py) {
      const p = this.player;
      const run = Math.abs(p.vx) > 0.2 && p.ong;
      const alt = ((p.a >> 4) & 1);
      const nm = CHARACTERS[this.characterIndex].name;

      if (nm === "SKELETON") {
        const top = run ? (alt ? S.st1 : S.st0) : S.st0;
        const bot = run ? (alt ? S.sb1 : S.sb0) : S.sb0;
        this.renderer.drawSpritePixels(top, px, py, 1);
        this.renderer.drawSpritePixels(bot, px, py + 10, 1);
        return;
      }

      if (nm === "DUCK") {
        const spr = p.q ? S.duq : (run ? (alt ? S.du1 : S.du0) : S.du0);
        this.renderer.drawSpritePixels(spr, px, py, 1);
        return;
      }

      const a = CHARACTERS[this.characterIndex].anim;
      const spr = run ? (alt ? S[a[1]] : S[a[0]]) : S[a[0]];
      this.renderer.drawSpritePixels(spr, px, py, 1);
    }

    update() {
      if (this.msg) this.msg--;

      const p = this.player;
      p.a++;

      // Key special actions (must match original edge-trigger behavior)
      const kd = this.input.keyDown;
      if (!this._prevKeyDown) this._prevKeyDown = {};

      const edge = (code) => kd[code] && !this._prevKeyDown[code];
      if (edge("KeyM")) this.audio.toggleMute();
      if (edge("KeyR")) this.die(1);
      if (edge("KeyZ")) {
        const n = this.skeletonUnlocked ? CHARACTERS.length : CHARACTERS.length - 1;
        this.setCharacter((this.characterIndex + 1) % n);
        this.audio.playTone(660, 0.04);
      }

      // Snapshot keys for next edge test
      for (const k in kd) this._prevKeyDown[k] = kd[k];

      const L = kd.ArrowLeft || kd.KeyA;
      const R = kd.ArrowRight || kd.KeyD;
      const JH = kd.Space || kd.ArrowUp;

      const gr = GRV[this.levelIndex];
      const fr = FRG[this.levelIndex];
      const af = AFG[this.levelIndex];

      const ch = CHARACTERS[this.characterIndex];
      const nm = ch.name;

      // Horizontal
      const dir = (R ? 1 : 0) - (L ? 1 : 0);
      if (dir) {
        p.vx += dir * AX;
        p.face = dir;
        p.vx = clamp(p.vx, -MX, MX);
      } else {
        p.vx *= p.ong ? fr : af;
      }

      // Jump buffer
      const buffered = this.input.consumeJumpBuffer();
      if (buffered) p.b = buffered;
      else this.input.tickJumpBuffer(), p.b = Math.max(0, p.b); // tickJumpBuffer already decremented; keep identical net effect
      if (!buffered) p.b = Math.max(0, p.b - 1); // match original decrement when no new buffer

      // Coyote + reset special resources on ground
      if (p.ong) {
        p.c = COY;
        p.jl = ch.doubleJumps;
        p.ft = ch.flyTicks;
        p.fly = 0;
      } else {
        p.c = Math.max(0, p.c - 1);
      }

      // Duck flight sustain
      if (p.fly) {
        if (nm !== "DUCK") p.fly = 0;
        else if (JH && p.ft > 0) {
          p.ft--;
          p.vy -= 0.16;
          if (p.vy < -2.4) p.vy = -2.4;
        } else {
          p.fly = 0;
        }
      }

      // Jump consume
      if (p.b) {
        if (p.c) {
          p.vy = J * ch.jumpMul;
          p.b = 0;
          p.c = 0;
          p.ong = 0;
          if (nm === "DUCK") { p.q = 10; this.audio.quack(); }
          else this.audio.playTone(420, 0.05);
        } else if (nm === "NINJA" && p.jl > 0) {
          p.jl--;
          p.vy = J * ch.jumpMul;
          p.b = 0;
          this.audio.playTone(520, 0.05);
        } else if (nm === "DUCK" && p.ft > 0) {
          p.fly = 1;
          p.ft = Math.max(0, p.ft - 6);
          p.vy = Math.min(p.vy, -2.2);
          p.b = 0;
          p.q = 10;
          this.audio.quack();
        }
      }

      // Gravity + jump cut
      p.vy += gr * (p.fly ? 0.25 : 1);
      if (p.vy > 8.5) p.vy = 8.5;
      if (!JH && p.vy < 0) p.vy *= 0.55;

      this.moveAndCollide(p);
      if (p.fly && p.vy === 0 && !p.ong) p.fly = 0;

      this.collectTiles();
      if (p.q) p.q--;

      // Drops
      for (let i = 0; i < this.drops.length; i++) {
        const d = this.drops[i];
        if (d.t-- <= 0) { d.dead = 1; continue; }
        d.vy += gr;
        d.vx *= 0.985;
        this.moveAndCollide(d);
        if (aabb(p, d)) {
          d.dead = 1;
          this.addScore(1);
          this.audio.playTone(740, 0.03);
        }
      }
      this.drops = this.drops.filter(d => !d.dead);

      // Enemies
      for (let i = 0; i < this.enemies.length; i++) {
        const e = this.enemies[i];
        if (e.dead) continue;
        e.a++;

        if (e.t) {
          e.vx = e.dir * 1.25;
          e.x += e.vx;
          this.collideX(e);
          e.y = e.by + Math.sin(e.a * 0.15) * 6;
        } else {
          e.vx = e.dir * ES;
          e.vy += gr;
          if (e.vy > 8.5) e.vy = 8.5;
          this.moveAndCollide(e);

          if (e.ong) {
            const ax = e.x + (e.dir > 0 ? e.w + 1 : -1);
            const tx = (ax / TS) | 0;
            const ty = ((e.y + e.h + 1) / TS) | 0;
            if (!this.solid(this.level.tileIdAt(tx, ty))) e.dir *= -1;
          }
        }

        if (aabb(p, e)) {
          if (e.t && nm === "SKELETON") {
            e.dead = 1;
            this.dropCoins(e.x + 2, e.y + 2);
            this.audio.playTone(180, 0.08);
          } else if (p.vy > 0 && p.y + p.h - 2 < e.y + e.h * 0.55) {
            e.dead = 1;
            p.vy = J * 0.6;
            this.dropCoins(e.x + 2, e.y + 2);
            this.audio.playTone(e.t ? 260 : 220, 0.08);
          } else {
            this.die(0);
          }
        }

        if (e.y > this.level.height * TS + 90) e.dead = 1;
      }

      // Wrap or fall
      if (p.wr) p.wr--;
      else if (p.y > this.level.height * TS + 40) this.wrapToTop();

      // Camera follow
      const tx = p.x + p.w * 0.5 - W * 0.5;
      const ty = p.y + p.h * 0.5 - H * 0.55;
      this.camx += (clamp(tx, 0, this.level.width * TS - W) - this.camx) * 0.12;
      this.camy += (clamp(ty, 0, this.level.height * TS - H) - this.camy) * 0.10;
    }

    draw() {
      const g = this.gfx;
      const r = this.renderer;

      g.setTransform(1, 0, 0, 1, 0, 0);
      this.drawBackground();

      const sx = (this.camx / TS) | 0;
      const sy = (this.camy / TS) | 0;
      const ex = sx + ((W / TS) | 0) + 3;
      const ey = sy + ((H / TS) | 0) + 3;

      const t = ((this.player.a >> 3) % 3);
      const POLE_H = 9;

      for (let y = sy; y < ey; y++) {
        for (let x = sx; x < ex; x++) {
          const id = this.level.tileIdAt(x, y);
          const px = x * TS - this.camx;
          const py = y * TS - this.camy;

          if (id === 1) r.drawSpritePixels(S.t1, px, py, 1);
          else if (id === 4) r.drawSpritePixels(S.t4, px, py, 1);
          else if (id === 2 || id === 5) r.drawSpritePixels(this.coinSprite(id), px, py, 1);
          else if (id === 6) r.drawSpritePixels(S.oneup, px, py, 1);
          else if (id === 7) r.drawSpritePixels((t & 1) ? S.lav0 : S.lav1, px, py, 1);
          else if (id === 3) {
            for (let j = 1; j <= POLE_H; j++) {
              r.drawSpritePixels(((j ^ t) & 1) ? S.pole0 : S.pole1, px, py - j * TS, 1);
            }
            r.drawSpritePixels(S.polet, px, py - (POLE_H + 1) * TS, 1);
            r.drawSpritePixels(t === 0 ? S.flag0 : t === 1 ? S.flag1 : S.flag2, px + 6, py - (POLE_H - 6) * TS, 1);
          }
        }
      }

      for (let i = 0; i < this.drops.length; i++) {
        const d = this.drops[i];
        r.drawSpritePixels(this.coinSprite(2), d.x - this.camx, d.y - this.camy, 1);
      }

      for (let i = 0; i < this.enemies.length; i++) {
        const e = this.enemies[i];
        if (e.dead) continue;
        const spr = e.t ? (((e.a >> 3) & 1) ? S.ba1 : S.ba0) : (((e.a >> 4) & 1) ? S.e1 : S.e0);
        r.drawSpritePixels(spr, e.x - this.camx, e.y - this.camy, 1);
      }

      const p = this.player;
      const px = p.x - this.camx;
      const py = p.y - this.camy;

      if (p.face < 0) {
        g.save();
        g.translate(((px + p.w) | 0), (py | 0));
        g.scale(-1, 1);
        this.drawPlayer(0, 0);
        g.restore();
      } else {
        this.drawPlayer(px, py);
      }

      if (this.msg) {
        g.fillStyle = "#000a";
        g.fillRect(78, 62, 164, 28);
        g.fillStyle = "#fff";
        g.font = "14px monospace";
        g.fillText(LEVEL_NAMES[this.levelIndex], 94, 82);
      }

      g.fillStyle = "#0008";
      g.fillRect(0, 0, W, 14);
      g.fillStyle = "#fff";
      g.font = "10px monospace";
      g.fillText("SCORE " + this.score, 6, 11);
      g.fillText("LIVES " + this.lives, 92, 11);
      g.fillText(LEVEL_NAMES[this.levelIndex], 152, 11);
      g.fillText(CHARACTERS[this.characterIndex].name, 210, 11);
      if (this.audio.muted) g.fillText("MUTE", W - 34, 11);
    }
  }

  // Boot with fixed update loop (unchanged timing semantics)
  const game = new Game(canvas, gfx);
  let last = performance.now();
  let acc = 0;

  const loop = (now) => {
    acc += Math.min(0.05, (now - last) / 1000);
    last = now;

    while (acc >= DT) {
      game.update();
      acc -= DT;
    }

    game.draw();
    requestAnimationFrame(loop);
  };

  requestAnimationFrame(loop);
})();
</script>
